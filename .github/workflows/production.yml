name: production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Check frontend types
        run: npm run types:check

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: php artisan test --compact

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Render Kubernetes manifests
        run: kubectl kustomize k8s/production > /tmp/downloora-production.yaml

  build:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          target: app
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Render image into manifests
        run: |
          rm -rf /tmp/downloora-k8s
          cp -R k8s/production /tmp/downloora-k8s
          find /tmp/downloora-k8s -type f -name '*.yaml' -exec sed -i "s|image: downloora-app|image: ${{ needs.build.outputs.image_ref }}|g" {} +

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload manifests
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'rm -rf ~/downloora-k8s && mkdir -p ~/downloora-k8s'
          scp -r /tmp/downloora-k8s/* "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/downloora-k8s/"

      - name: Deploy to VPS Kubernetes
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ghcr_username_b64="$(printf '%s' "${GHCR_USERNAME:-}" | base64 -w0)"
          ghcr_token_b64="$(printf '%s' "${GHCR_TOKEN:-}" | base64 -w0)"

          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_USERNAME_B64=${ghcr_username_b64} GHCR_TOKEN_B64=${ghcr_token_b64} bash -s" <<'REMOTE'
          set -euo pipefail

          GHCR_USERNAME="$(printf '%s' "${GHCR_USERNAME_B64:-}" | base64 -d)"
          GHCR_TOKEN="$(printf '%s' "${GHCR_TOKEN_B64:-}" | base64 -d)"

          kubectl apply -f ~/downloora-k8s/namespace.yaml

          if ! kubectl -n downloora get secret downloora-secrets >/dev/null 2>&1; then
            echo "Missing Kubernetes secret downloora/downloora-secrets. Create it from k8s/production/secret.example.yaml before deploying."
            exit 1
          fi

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            kubectl -n downloora create secret docker-registry ghcr-credentials \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl -n downloora patch serviceaccount default \
              -p '{"imagePullSecrets":[{"name":"ghcr-credentials"}]}' >/dev/null
          fi

          kubectl -n downloora delete job downloora-migrate --ignore-not-found
          kubectl apply -k ~/downloora-k8s

          kubectl -n downloora rollout status statefulset/postgres --timeout=300s
          kubectl -n downloora rollout status statefulset/redis --timeout=180s
          kubectl -n downloora rollout status statefulset/minio --timeout=300s
          kubectl -n downloora rollout status deployment/qbittorrent --timeout=300s
          kubectl -n downloora wait --for=condition=complete job/downloora-migrate --timeout=300s
          kubectl -n downloora rollout status deployment/downloora-app --timeout=300s
          kubectl -n downloora rollout status deployment/downloora-queue --timeout=300s
          kubectl -n downloora rollout status deployment/downloora-scheduler --timeout=180s
          REMOTE
