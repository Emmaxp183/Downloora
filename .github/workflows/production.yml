name: production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "22"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Check PHP formatting
        run: composer lint:check

      - name: Check frontend formatting
        run: npm run format:check

      - name: Check frontend lint
        run: npm run lint:check

      - name: Check frontend types
        run: npm run types:check

      - name: Build frontend assets
        run: npm run build

      - name: Run tests
        run: php artisan test --compact

      - name: Validate production Compose config
        run: |
          APP_IMAGE=ghcr.io/example/downloora docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          APP_IMAGE=ghcr.io/example/downloora docker compose -f docker-compose.yml -f docker-compose.prod.yml config --format json \
            | jq -e '.services.app.build == null and .services.queue.build == null and .services.scheduler.build == null'

  build:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          target: app
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/downloora' }}
      VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER || 'root' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error::Missing VPS_HOST. Add it as a GitHub Actions secret or variable with your VPS public IP address."
            exit 1
          fi

          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error::Missing VPS_SSH_KEY. Add it as a GitHub Actions secret containing the private SSH key for the VPS."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload Compose files
        run: |
          # shellcheck disable=SC2029
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p '$DEPLOY_PATH/docker/caddy' '$DEPLOY_PATH/docker/qbittorrent'"
          scp docker-compose.yml docker-compose.prod.yml "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/"
          scp docker/caddy/Caddyfile "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/docker/caddy/Caddyfile"
          scp docker/qbittorrent/qBittorrent.conf "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/docker/qbittorrent/qBittorrent.conf"

      - name: Deploy with Docker Compose
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
          APP_IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ghcr_username_b64="$(printf '%s' "$GHCR_USERNAME" | base64 -w0)"
          ghcr_token_b64="$(printf '%s' "$GHCR_TOKEN" | base64 -w0)"

          # shellcheck disable=SC2029
          ssh "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' APP_IMAGE='$APP_IMAGE' APP_IMAGE_TAG='$APP_IMAGE_TAG' GHCR_USERNAME_B64='$ghcr_username_b64' GHCR_TOKEN_B64='$ghcr_token_b64' bash -s" <<'REMOTE'
          set -euo pipefail

          GHCR_USERNAME="$(printf '%s' "$GHCR_USERNAME_B64" | base64 -d)"
          GHCR_TOKEN="$(printf '%s' "$GHCR_TOKEN_B64" | base64 -d)"

          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing $DEPLOY_PATH/.env. Create it on the VPS before deploying."
            exit 1
          fi

          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          APP_IMAGE="$APP_IMAGE" APP_IMAGE_TAG="$APP_IMAGE_TAG" docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          APP_IMAGE="$APP_IMAGE" APP_IMAGE_TAG="$APP_IMAGE_TAG" docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
          docker image prune -f
          REMOTE
