apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: downloora
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - downloora.com
      secretName: downloora-tls
  rules:
    - host: downloora.com
      http:
        paths:
          - path: /__transferd
            pathType: Prefix
            backend:
              service:
                name: downloora-transferd
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: downloora-app
                port:
                  name: http
