apiVersion: v1
kind: Service
metadata:
  name: rustfs
spec:
  selector:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/part-of: downloora
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
spec:
  serviceName: rustfs
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
      app.kubernetes.io/part-of: downloora
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
        app.kubernetes.io/part-of: downloora
    spec:
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          imagePullPolicy: IfNotPresent
          args:
            - /data
          env:
            - name: RUSTFS_ADDRESS
              value: ":9000"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: downloora-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: downloora-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: rustfs-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: rustfs-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 200Gi
