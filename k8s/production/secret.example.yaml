apiVersion: v1
kind: Secret
metadata:
  name: downloora-secrets
  namespace: downloora
type: Opaque
stringData:
  APP_KEY: base64:replace-with-php-artisan-key-generate-output
  DB_PASSWORD: replace-with-strong-postgres-password
  POSTGRES_PASSWORD: replace-with-same-strong-postgres-password
  AWS_ACCESS_KEY_ID: replace-with-rustfs-access-key
  AWS_SECRET_ACCESS_KEY: replace-with-rustfs-secret-key
  RQBIT_USERNAME: ""
  RQBIT_PASSWORD: ""
  RESEND_API_KEY: replace-with-resend-api-key
  GOOGLE_CLIENT_ID: replace-with-google-client-id
  GOOGLE_CLIENT_SECRET: replace-with-google-client-secret
  GOOGLE_REDIRECT_URI: https://downloora.example.com/auth/google/callback
  STRIPE_KEY: replace-with-stripe-publishable-key
  STRIPE_SECRET: replace-with-stripe-secret-key
  STRIPE_WEBHOOK_SECRET: replace-with-stripe-webhook-secret
  STRIPE_BASIC_PRICE_ID: replace-with-basic-price-id
  STRIPE_PRO_PRICE_ID: replace-with-pro-price-id
  STRIPE_MASTER_PRICE_ID: replace-with-master-price-id
