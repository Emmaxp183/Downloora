apiVersion: v1
kind: ConfigMap
metadata:
  name: downloora-config
data:
  APP_NAME: Downloora
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://downloora.com
  APP_LOCALE: en
  APP_FALLBACK_LOCALE: en
  APP_FAKER_LOCALE: en_US
  APP_MAINTENANCE_DRIVER: file
  BCRYPT_ROUNDS: "12"
  LOG_CHANNEL: stderr
  LOG_STACK: single
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: info
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: downloora
  DB_USERNAME: downloora
  DB_SSLMODE: disable
  SESSION_DRIVER: redis
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "true"
  SESSION_PATH: /
  SESSION_SECURE_COOKIE: "true"
  SESSION_DOMAIN: downloora.com
  BROADCAST_CONNECTION: log
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  QUEUE_RETRY_AFTER: "3900"
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  FILESYSTEM_DISK: s3
  AWS_DEFAULT_REGION: us-east-1
  AWS_BUCKET: downloora
  AWS_ENDPOINT: http://rustfs:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  IMPORT_S3_CONCURRENCY: "16"
  IMPORT_S3_PART_SIZE_MB: "32"
  TRANSFERD_ENABLED: "true"
  TRANSFERD_PUBLIC_URL: /__transferd
  TRANSFERD_ADDR: :8080
  LOCAL_STORAGE_ROOT: /var/www/html/storage/app/private
  MAIL_MAILER: resend
  MAIL_FROM_ADDRESS: noreply@downloora.com
  MAIL_FROM_NAME: Downloora
  CASHIER_CURRENCY: eur
  TORRENTS_DEFAULT_USER_QUOTA_BYTES: "2147483648"
  TORRENTS_GLOBAL_ACTIVE_LIMIT: "100"
  TORRENTS_PER_USER_ACTIVE_LIMIT: "50"
  TORRENTS_ENGINE: rqbit
  RQBIT_BASE_URL: http://rqbit:3030
  RQBIT_TIMEOUT: "10"
  RQBIT_ADD_TIMEOUT: "120"
  RQBIT_METADATA_TIMEOUT: "8"
  RQBIT_METADATA_POLL_ATTEMPTS: "90"
  RQBIT_METADATA_POLL_INTERVAL_MS: "2000"
  RQBIT_TORRENTING_PORT: "6881"
  RQBIT_TORRENTING_MAX_PORT: "6999"
  RQBIT_WORKER_THREADS: "32"
  RQBIT_MAX_BLOCKING_THREADS: "128"
  RQBIT_CONCURRENT_INIT_LIMIT: "64"
  RQBIT_TRACKER_REFRESH_INTERVAL: 30s
  RQBIT_PEER_CONNECT_TIMEOUT: 2s
  RQBIT_PEER_READ_WRITE_TIMEOUT: 10s
  RQBIT_DHT_QUERIES_PER_SECOND: "256"
  RQBIT_KEEP_AFTER_IMPORT: "true"
  RQBIT_UPLOAD_LIMIT_BYTES: "4294967295"
  RQBIT_DOWNLOAD_LIMIT_BYTES: "4294967295"
  YTDLP_BINARY: yt-dlp
  YTDLP_INSPECT_TIMEOUT: "60"
  YTDLP_DOWNLOAD_TIMEOUT: "3600"
  DOWNLOAD_TARGET_BANDWIDTH_MBPS: "10000"
  YTDLP_ADAPTIVE_SEGMENTS: "true"
  YTDLP_CONCURRENT_FRAGMENTS: "256"
  YTDLP_MAX_CONCURRENT_FRAGMENTS: "1024"
  YTDLP_HTTP_CHUNK_SIZE: "64M"
  YTDLP_EXTERNAL_DOWNLOADER: aria2c
  YTDLP_SEGMENT_CONNECTIONS: "256"
  YTDLP_MAX_SEGMENT_CONNECTIONS: "1024"
  YTDLP_SEGMENT_SPLIT: "256"
  YTDLP_MAX_SEGMENT_SPLIT: "1024"
  YTDLP_SEGMENT_MIN_SPLIT_SIZE: "1M"
  YTDLP_SEGMENT_PIECE_LENGTH: "1M"
  YTDLP_SEGMENT_DISK_CACHE: "1024M"
  YTDLP_RETRIES: "10"
  YTDLP_FRAGMENT_RETRIES: "10"
  YTDLP_SOCKET_TIMEOUT: "30"
  YTDLP_POT_DISABLE_INNERTUBE: "true"
  YTDLP_YOUTUBE_PLAYER_CLIENTS: mweb,web_safari,android_vr
  TZ: UTC
  RUN_MIGRATIONS: "false"
