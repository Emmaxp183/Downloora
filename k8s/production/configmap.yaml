apiVersion: v1
kind: ConfigMap
metadata:
  name: downloora-config
data:
  APP_NAME: Downloora
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://downloora.com
  APP_LOCALE: en
  APP_FALLBACK_LOCALE: en
  APP_FAKER_LOCALE: en_US
  APP_MAINTENANCE_DRIVER: file
  BCRYPT_ROUNDS: "12"
  LOG_CHANNEL: stderr
  LOG_STACK: single
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: info
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: downloora
  DB_USERNAME: downloora
  DB_SSLMODE: disable
  SESSION_DRIVER: redis
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "true"
  SESSION_PATH: /
  SESSION_SECURE_COOKIE: "true"
  SESSION_DOMAIN: downloora.com
  BROADCAST_CONNECTION: log
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  FILESYSTEM_DISK: s3
  AWS_DEFAULT_REGION: us-east-1
  AWS_BUCKET: downloora
  AWS_ENDPOINT: http://rustfs:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  IMPORT_S3_CONCURRENCY: "16"
  IMPORT_S3_PART_SIZE_MB: "32"
  TRANSFERD_ENABLED: "true"
  TRANSFERD_PUBLIC_URL: /__transferd
  TRANSFERD_ADDR: :8080
  LOCAL_STORAGE_ROOT: /var/www/html/storage/app/private
  MAIL_MAILER: resend
  MAIL_FROM_ADDRESS: noreply@downloora.com
  MAIL_FROM_NAME: Downloora
  CASHIER_CURRENCY: eur
  TORRENTS_DEFAULT_USER_QUOTA_BYTES: "734003200"
  TORRENTS_GLOBAL_ACTIVE_LIMIT: "5"
  QBITTORRENT_BASE_URL: http://qbittorrent:8080
  QBITTORRENT_TIMEOUT: "10"
  QBITTORRENT_METADATA_POLL_ATTEMPTS: "30"
  QBITTORRENT_METADATA_POLL_INTERVAL_MS: "1000"
  QBITTORRENT_TORRENTING_PORT: "6881"
  QBITTORRENT_KEEP_AFTER_IMPORT: "true"
  QBITTORRENT_DOWNLOAD_LIMIT_KIB: "-1"
  QBITTORRENT_UPLOAD_LIMIT_KIB: "-1"
  QBITTORRENT_MAX_ACTIVE_DOWNLOADS: "100"
  QBITTORRENT_MAX_ACTIVE_TORRENTS: "150"
  QBITTORRENT_MAX_ACTIVE_UPLOADS: "150"
  QBITTORRENT_CONNECTION_SPEED: "10000"
  QBITTORRENT_ASYNC_IO_THREADS: "128"
  QBITTORRENT_DISK_CACHE_MB: "32768"
  QBITTORRENT_MAX_CONNECTIONS: "64000"
  QBITTORRENT_MAX_CONNECTIONS_PER_TORRENT: "16000"
  QBITTORRENT_MAX_UPLOADS: "8000"
  QBITTORRENT_MAX_UPLOADS_PER_TORRENT: "2000"
  QBITTORRENT_MAX_CONCURRENT_HTTP_ANNOUNCES: "1000"
  QBITTORRENT_MULTI_CONNECTIONS_FROM_SAME_IP: "true"
  QBITTORRENT_EXTRA_TRACKERS: ""
  YTDLP_BINARY: yt-dlp
  YTDLP_INSPECT_TIMEOUT: "60"
  YTDLP_DOWNLOAD_TIMEOUT: "3600"
  YTDLP_ADAPTIVE_SEGMENTS: "true"
  YTDLP_CONCURRENT_FRAGMENTS: "64"
  YTDLP_MAX_CONCURRENT_FRAGMENTS: "192"
  YTDLP_HTTP_CHUNK_SIZE: "32M"
  YTDLP_EXTERNAL_DOWNLOADER: aria2c
  YTDLP_SEGMENT_CONNECTIONS: "64"
  YTDLP_MAX_SEGMENT_CONNECTIONS: "192"
  YTDLP_SEGMENT_SPLIT: "64"
  YTDLP_MAX_SEGMENT_SPLIT: "192"
  YTDLP_SEGMENT_MIN_SPLIT_SIZE: "1M"
  YTDLP_SEGMENT_PIECE_LENGTH: "1M"
  YTDLP_SEGMENT_DISK_CACHE: "256M"
  YTDLP_RETRIES: "10"
  YTDLP_FRAGMENT_RETRIES: "10"
  YTDLP_SOCKET_TIMEOUT: "30"
  YTDLP_POT_DISABLE_INNERTUBE: "true"
  YTDLP_YOUTUBE_PLAYER_CLIENTS: mweb,web_safari,android_vr
  TZ: UTC
  RUN_MIGRATIONS: "false"
