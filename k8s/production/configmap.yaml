apiVersion: v1
kind: ConfigMap
metadata:
  name: downloora-config
data:
  APP_NAME: Downloora
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://downloora.com
  APP_LOCALE: en
  APP_FALLBACK_LOCALE: en
  APP_FAKER_LOCALE: en_US
  APP_MAINTENANCE_DRIVER: file
  BCRYPT_ROUNDS: "12"
  LOG_CHANNEL: stderr
  LOG_STACK: single
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: info
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: downloora
  DB_USERNAME: downloora
  DB_SSLMODE: disable
  SESSION_DRIVER: redis
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "true"
  SESSION_PATH: /
  SESSION_SECURE_COOKIE: "true"
  SESSION_DOMAIN: downloora.com
  BROADCAST_CONNECTION: log
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  FILESYSTEM_DISK: s3
  AWS_DEFAULT_REGION: us-east-1
  AWS_BUCKET: downloora
  AWS_ENDPOINT: http://rustfs:9000
  AWS_USE_PATH_STYLE_ENDPOINT: "true"
  IMPORT_S3_CONCURRENCY: "8"
  IMPORT_S3_PART_SIZE_MB: "16"
  MAIL_MAILER: resend
  MAIL_FROM_ADDRESS: onboarding@resend.dev
  MAIL_FROM_NAME: Downloora
  CASHIER_CURRENCY: eur
  TORRENTS_DEFAULT_USER_QUOTA_BYTES: "734003200"
  TORRENTS_GLOBAL_ACTIVE_LIMIT: "5"
  QBITTORRENT_BASE_URL: http://qbittorrent:8080
  QBITTORRENT_TIMEOUT: "10"
  QBITTORRENT_METADATA_POLL_ATTEMPTS: "30"
  QBITTORRENT_METADATA_POLL_INTERVAL_MS: "1000"
  QBITTORRENT_TORRENTING_PORT: "6881"
  YTDLP_BINARY: yt-dlp
  YTDLP_INSPECT_TIMEOUT: "60"
  YTDLP_DOWNLOAD_TIMEOUT: "3600"
  YTDLP_CONCURRENT_FRAGMENTS: "8"
  YTDLP_RETRIES: "10"
  YTDLP_FRAGMENT_RETRIES: "10"
  YTDLP_SOCKET_TIMEOUT: "30"
  TZ: UTC
  RUN_MIGRATIONS: "false"
