apiVersion: v1
kind: Service
metadata:
  name: rqbit
spec:
  selector:
    app.kubernetes.io/name: rqbit
    app.kubernetes.io/part-of: downloora
  ports:
    - name: http
      port: 3030
      targetPort: http
    - name: torrent-tcp
      port: 6881
      targetPort: torrent-tcp
      protocol: TCP
    - name: torrent-tcp-alt
      port: 6882
      targetPort: torrent-tcp-alt
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: rqbit-peers
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: rqbit
    app.kubernetes.io/part-of: downloora
  ports:
    - name: torrent-tcp
      port: 6881
      targetPort: torrent-tcp
      protocol: TCP
    - name: torrent-tcp-alt
      port: 6882
      targetPort: torrent-tcp-alt
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rqbit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rqbit
      app.kubernetes.io/part-of: downloora
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rqbit
        app.kubernetes.io/part-of: downloora
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: rqbit
          image: ikatson/rqbit:latest
          imagePullPolicy: IfNotPresent
          command:
            - rqbit
            - server
            - start
            - --fastresume
            - --persistence-location
            - /config
            - /downloads
          env:
            - name: RQBIT_HTTP_API_LISTEN_ADDR
              value: 0.0.0.0:3030
            - name: RQBIT_TCP_LISTEN_MIN_PORT
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_TORRENTING_PORT
            - name: RQBIT_TCP_LISTEN_MAX_PORT
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_TORRENTING_MAX_PORT
            - name: RQBIT_RUNTIME_WORKER_THREADS
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_WORKER_THREADS
            - name: RQBIT_RUNTIME_MAX_BLOCKING_THREADS
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_MAX_BLOCKING_THREADS
            - name: RQBIT_CONCURRENT_INIT_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_CONCURRENT_INIT_LIMIT
            - name: RQBIT_TRACKER_REFRESH_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_TRACKER_REFRESH_INTERVAL
            - name: RQBIT_PEER_CONNECT_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_PEER_CONNECT_TIMEOUT
            - name: RQBIT_PEER_READ_WRITE_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_PEER_READ_WRITE_TIMEOUT
            - name: DHT_QUERIES_PER_SECOND
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_DHT_QUERIES_PER_SECOND
            - name: RQBIT_RATELIMIT_UPLOAD
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_UPLOAD_LIMIT_BYTES
            - name: RQBIT_RATELIMIT_DOWNLOAD
              valueFrom:
                configMapKeyRef:
                  name: downloora-config
                  key: RQBIT_DOWNLOAD_LIMIT_BYTES
          ports:
            - name: http
              containerPort: 3030
            - name: torrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: torrent-udp
              containerPort: 6881
              protocol: UDP
              protocol: TCP
            - name: torrent-tcp-alt
              containerPort: 6882
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: qbittorrent-downloads
              mountPath: /downloads
            - name: rqbit-config
              mountPath: /config
      volumes:
        - name: qbittorrent-downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
        - name: rqbit-config
          emptyDir: {}
