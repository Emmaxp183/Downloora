apiVersion: v1
kind: Service
metadata:
  name: downloora-transferd
spec:
  selector:
    app.kubernetes.io/name: downloora-transferd
    app.kubernetes.io/part-of: downloora
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: downloora-transferd
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: downloora-transferd
      app.kubernetes.io/part-of: downloora
  template:
    metadata:
      labels:
        app.kubernetes.io/name: downloora-transferd
        app.kubernetes.io/part-of: downloora
    spec:
      containers:
        - name: transferd
          image: downloora-transferd
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: downloora-config
            - secretRef:
                name: downloora-secrets
            - secretRef:
                name: downloora-env
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: private-storage
              mountPath: /var/www/html/storage/app/private
            - name: qbittorrent-downloads
              mountPath: /var/www/html/storage/app/private/qbittorrent
      volumes:
        - name: private-storage
          persistentVolumeClaim:
            claimName: downloora-private-storage
        - name: qbittorrent-downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
