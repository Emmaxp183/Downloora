name: downloora

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      ENSURE_S3_BUCKET: ${ENSURE_S3_BUCKET:-true}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-downloora}
      DB_USERNAME: ${DB_USERNAME:-downloora}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-downloora}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      IMPORT_S3_CONCURRENCY: ${IMPORT_S3_CONCURRENCY:-16}
      IMPORT_S3_PART_SIZE_MB: ${IMPORT_S3_PART_SIZE_MB:-32}
      TRANSFERD_ENABLED: ${TRANSFERD_ENABLED:-true}
      TRANSFERD_PUBLIC_URL: ${TRANSFERD_PUBLIC_URL:-/__transferd}
      QBITTORRENT_BASE_URL: http://qbittorrent:8080
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      QBITTORRENT_KEEP_AFTER_IMPORT: ${QBITTORRENT_KEEP_AFTER_IMPORT:-true}
      QBITTORRENT_CONNECTION_SPEED: ${QBITTORRENT_CONNECTION_SPEED:-10000}
      QBITTORRENT_ASYNC_IO_THREADS: ${QBITTORRENT_ASYNC_IO_THREADS:-128}
      QBITTORRENT_DISK_CACHE_MB: ${QBITTORRENT_DISK_CACHE_MB:-32768}
      QBITTORRENT_MAX_CONNECTIONS: ${QBITTORRENT_MAX_CONNECTIONS:-64000}
      QBITTORRENT_MAX_CONNECTIONS_PER_TORRENT: ${QBITTORRENT_MAX_CONNECTIONS_PER_TORRENT:-16000}
      QBITTORRENT_MAX_ACTIVE_UPLOADS: ${QBITTORRENT_MAX_ACTIVE_UPLOADS:-150}
      QBITTORRENT_MAX_UPLOADS: ${QBITTORRENT_MAX_UPLOADS:-8000}
      QBITTORRENT_MAX_UPLOADS_PER_TORRENT: ${QBITTORRENT_MAX_UPLOADS_PER_TORRENT:-2000}
      QBITTORRENT_MAX_CONCURRENT_HTTP_ANNOUNCES: ${QBITTORRENT_MAX_CONCURRENT_HTTP_ANNOUNCES:-1000}
      YTDLP_POT_PROVIDER_URL: ${YTDLP_POT_PROVIDER_URL:-http://yt-dlp-pot-provider:4416}
      YTDLP_POT_DISABLE_INNERTUBE: ${YTDLP_POT_DISABLE_INNERTUBE:-true}
      YTDLP_YOUTUBE_PLAYER_CLIENTS: ${YTDLP_YOUTUBE_PLAYER_CLIENTS:-mweb,web_safari,android_vr}
      YTDLP_ADAPTIVE_SEGMENTS: ${YTDLP_ADAPTIVE_SEGMENTS:-true}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-64}
      YTDLP_MAX_CONCURRENT_FRAGMENTS: ${YTDLP_MAX_CONCURRENT_FRAGMENTS:-192}
      YTDLP_HTTP_CHUNK_SIZE: ${YTDLP_HTTP_CHUNK_SIZE:-32M}
      YTDLP_EXTERNAL_DOWNLOADER: ${YTDLP_EXTERNAL_DOWNLOADER:-aria2c}
      YTDLP_SEGMENT_CONNECTIONS: ${YTDLP_SEGMENT_CONNECTIONS:-64}
      YTDLP_MAX_SEGMENT_CONNECTIONS: ${YTDLP_MAX_SEGMENT_CONNECTIONS:-192}
      YTDLP_SEGMENT_SPLIT: ${YTDLP_SEGMENT_SPLIT:-64}
      YTDLP_MAX_SEGMENT_SPLIT: ${YTDLP_MAX_SEGMENT_SPLIT:-192}
      YTDLP_SEGMENT_MIN_SPLIT_SIZE: ${YTDLP_SEGMENT_MIN_SPLIT_SIZE:-1M}
      YTDLP_SEGMENT_PIECE_LENGTH: ${YTDLP_SEGMENT_PIECE_LENGTH:-1M}
      YTDLP_SEGMENT_DISK_CACHE: ${YTDLP_SEGMENT_DISK_CACHE:-256M}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
      qbittorrent:
        condition: service_started
      yt-dlp-pot-provider:
        condition: service_started
      transferd:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - downloora

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-downloora}
      DB_USERNAME: ${DB_USERNAME:-downloora}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-downloora}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      IMPORT_S3_CONCURRENCY: ${IMPORT_S3_CONCURRENCY:-16}
      IMPORT_S3_PART_SIZE_MB: ${IMPORT_S3_PART_SIZE_MB:-32}
      QBITTORRENT_BASE_URL: http://qbittorrent:8080
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      QBITTORRENT_KEEP_AFTER_IMPORT: ${QBITTORRENT_KEEP_AFTER_IMPORT:-true}
      QBITTORRENT_CONNECTION_SPEED: ${QBITTORRENT_CONNECTION_SPEED:-10000}
      QBITTORRENT_ASYNC_IO_THREADS: ${QBITTORRENT_ASYNC_IO_THREADS:-128}
      QBITTORRENT_DISK_CACHE_MB: ${QBITTORRENT_DISK_CACHE_MB:-32768}
      QBITTORRENT_MAX_CONNECTIONS: ${QBITTORRENT_MAX_CONNECTIONS:-64000}
      QBITTORRENT_MAX_CONNECTIONS_PER_TORRENT: ${QBITTORRENT_MAX_CONNECTIONS_PER_TORRENT:-16000}
      QBITTORRENT_MAX_ACTIVE_UPLOADS: ${QBITTORRENT_MAX_ACTIVE_UPLOADS:-150}
      QBITTORRENT_MAX_UPLOADS: ${QBITTORRENT_MAX_UPLOADS:-8000}
      QBITTORRENT_MAX_UPLOADS_PER_TORRENT: ${QBITTORRENT_MAX_UPLOADS_PER_TORRENT:-2000}
      QBITTORRENT_MAX_CONCURRENT_HTTP_ANNOUNCES: ${QBITTORRENT_MAX_CONCURRENT_HTTP_ANNOUNCES:-1000}
      QUEUE_WORKER_PROCESSES: ${QUEUE_WORKER_PROCESSES:-3}
      YTDLP_POT_PROVIDER_URL: ${YTDLP_POT_PROVIDER_URL:-http://yt-dlp-pot-provider:4416}
      YTDLP_POT_DISABLE_INNERTUBE: ${YTDLP_POT_DISABLE_INNERTUBE:-true}
      YTDLP_YOUTUBE_PLAYER_CLIENTS: ${YTDLP_YOUTUBE_PLAYER_CLIENTS:-mweb,web_safari,android_vr}
      YTDLP_ADAPTIVE_SEGMENTS: ${YTDLP_ADAPTIVE_SEGMENTS:-true}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-64}
      YTDLP_MAX_CONCURRENT_FRAGMENTS: ${YTDLP_MAX_CONCURRENT_FRAGMENTS:-192}
      YTDLP_HTTP_CHUNK_SIZE: ${YTDLP_HTTP_CHUNK_SIZE:-32M}
      YTDLP_EXTERNAL_DOWNLOADER: ${YTDLP_EXTERNAL_DOWNLOADER:-aria2c}
      YTDLP_SEGMENT_CONNECTIONS: ${YTDLP_SEGMENT_CONNECTIONS:-64}
      YTDLP_MAX_SEGMENT_CONNECTIONS: ${YTDLP_MAX_SEGMENT_CONNECTIONS:-192}
      YTDLP_SEGMENT_SPLIT: ${YTDLP_SEGMENT_SPLIT:-64}
      YTDLP_MAX_SEGMENT_SPLIT: ${YTDLP_MAX_SEGMENT_SPLIT:-192}
      YTDLP_SEGMENT_MIN_SPLIT_SIZE: ${YTDLP_SEGMENT_MIN_SPLIT_SIZE:-1M}
      YTDLP_SEGMENT_PIECE_LENGTH: ${YTDLP_SEGMENT_PIECE_LENGTH:-1M}
      YTDLP_SEGMENT_DISK_CACHE: ${YTDLP_SEGMENT_DISK_CACHE:-256M}
    command:
      [
        "sh",
        "-c",
        "for worker in $$(seq 1 $${QUEUE_WORKER_PROCESSES:-3}); do php artisan queue:work redis --sleep=1 --tries=3 --timeout=3600 & done; wait -n",
      ]
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      yt-dlp-pot-provider:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - downloora

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-downloora}
      DB_USERNAME: ${DB_USERNAME:-downloora}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-downloora}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    depends_on:
      app:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - downloora

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
      - "${CADDY_HTTPS_PORT:-8443}:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_started
      transferd:
        condition: service_started
    networks:
      - downloora

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-downloora}
      POSTGRES_USER: ${DB_USERNAME:-downloora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - downloora

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - downloora

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      WEBUI_PORT: 8080
      TORRENTING_PORT: ${QBITTORRENT_TORRENTING_PORT:-6881}
    ports:
      - "${QBITTORRENT_TORRENTING_PORT:-6881}:${QBITTORRENT_TORRENTING_PORT:-6881}/tcp"
      - "${QBITTORRENT_TORRENTING_PORT:-6881}:${QBITTORRENT_TORRENTING_PORT:-6881}/udp"
    volumes:
      - qbittorrent-config:/config
      - qbittorrent-downloads:/downloads
      - ./docker/qbittorrent/qBittorrent.conf:/config/qBittorrent/qBittorrent.conf
    networks:
      - downloora

  yt-dlp-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    networks:
      - downloora

  transferd:
    build:
      context: .
      dockerfile: services/transferd/Dockerfile
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      TRANSFERD_ADDR: :8080
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      LOCAL_STORAGE_ROOT: /var/www/html/storage/app/private
    depends_on:
      rustfs:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - downloora

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["/data"]
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    networks:
      - downloora

volumes:
  laravel-storage:
    external: true
    name: seedr_laravel-storage
  postgres-data:
    external: true
    name: seedr_postgres-data
  redis-data:
    external: true
    name: seedr_redis-data
  qbittorrent-config:
    external: true
    name: seedr_qbittorrent-config
  qbittorrent-downloads:
    external: true
    name: seedr_qbittorrent-downloads
  rustfs-data:
    external: true
    name: seedr_rustfs-data
  caddy-data:
    external: true
    name: seedr_caddy-data
  caddy-config:
    external: true
    name: seedr_caddy-config

networks:
  downloora:
    driver: bridge
