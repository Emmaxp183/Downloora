name: downloora

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      ENSURE_S3_BUCKET: ${ENSURE_S3_BUCKET:-true}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-downloora}
      DB_USERNAME: ${DB_USERNAME:-downloora}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      QUEUE_RETRY_AFTER: ${QUEUE_RETRY_AFTER:-3900}
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-downloora}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      IMPORT_S3_CONCURRENCY: ${IMPORT_S3_CONCURRENCY:-16}
      IMPORT_S3_PART_SIZE_MB: ${IMPORT_S3_PART_SIZE_MB:-32}
      TORRENTS_GLOBAL_ACTIVE_LIMIT: ${TORRENTS_GLOBAL_ACTIVE_LIMIT:-100}
      TORRENTS_PER_USER_ACTIVE_LIMIT: ${TORRENTS_PER_USER_ACTIVE_LIMIT:-50}
      TRANSFERD_ENABLED: ${TRANSFERD_ENABLED:-true}
      TRANSFERD_PUBLIC_URL: ${TRANSFERD_PUBLIC_URL:-/__transferd}
      TORRENTS_ENGINE: rqbit
      RQBIT_BASE_URL: http://rqbit:3030
      RQBIT_ADD_TIMEOUT: ${RQBIT_ADD_TIMEOUT:-120}
      RQBIT_KEEP_AFTER_IMPORT: ${RQBIT_KEEP_AFTER_IMPORT:-true}
      RQBIT_METADATA_TIMEOUT: ${RQBIT_METADATA_TIMEOUT:-8}
      RQBIT_METADATA_POLL_ATTEMPTS: ${RQBIT_METADATA_POLL_ATTEMPTS:-90}
      RQBIT_METADATA_POLL_INTERVAL_MS: ${RQBIT_METADATA_POLL_INTERVAL_MS:-2000}
      RQBIT_TORRENTING_PORT: ${RQBIT_TORRENTING_PORT:-6881}
      RQBIT_TORRENTING_MAX_PORT: ${RQBIT_TORRENTING_MAX_PORT:-6999}
      RQBIT_WORKER_THREADS: ${RQBIT_WORKER_THREADS:-32}
      RQBIT_MAX_BLOCKING_THREADS: ${RQBIT_MAX_BLOCKING_THREADS:-128}
      RQBIT_CONCURRENT_INIT_LIMIT: ${RQBIT_CONCURRENT_INIT_LIMIT:-64}
      RQBIT_TRACKER_REFRESH_INTERVAL: ${RQBIT_TRACKER_REFRESH_INTERVAL:-30s}
      RQBIT_PEER_CONNECT_TIMEOUT: ${RQBIT_PEER_CONNECT_TIMEOUT:-2s}
      RQBIT_PEER_READ_WRITE_TIMEOUT: ${RQBIT_PEER_READ_WRITE_TIMEOUT:-10s}
      RQBIT_DHT_QUERIES_PER_SECOND: ${RQBIT_DHT_QUERIES_PER_SECOND:-256}
      RQBIT_UPLOAD_LIMIT_BYTES: ${RQBIT_UPLOAD_LIMIT_BYTES:-4294967295}
      RQBIT_DOWNLOAD_LIMIT_BYTES: ${RQBIT_DOWNLOAD_LIMIT_BYTES:-4294967295}
      YTDLP_POT_PROVIDER_URL: ${YTDLP_POT_PROVIDER_URL:-http://yt-dlp-pot-provider:4416}
      YTDLP_POT_DISABLE_INNERTUBE: ${YTDLP_POT_DISABLE_INNERTUBE:-true}
      YTDLP_YOUTUBE_PLAYER_CLIENTS: ${YTDLP_YOUTUBE_PLAYER_CLIENTS:-mweb,web_safari,android_vr}
      DOWNLOAD_TARGET_BANDWIDTH_MBPS: ${DOWNLOAD_TARGET_BANDWIDTH_MBPS:-10000}
      YTDLP_ADAPTIVE_SEGMENTS: ${YTDLP_ADAPTIVE_SEGMENTS:-true}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-256}
      YTDLP_MAX_CONCURRENT_FRAGMENTS: ${YTDLP_MAX_CONCURRENT_FRAGMENTS:-1024}
      YTDLP_HTTP_CHUNK_SIZE: ${YTDLP_HTTP_CHUNK_SIZE:-64M}
      YTDLP_EXTERNAL_DOWNLOADER: ${YTDLP_EXTERNAL_DOWNLOADER:-aria2c}
      YTDLP_SEGMENT_CONNECTIONS: ${YTDLP_SEGMENT_CONNECTIONS:-256}
      YTDLP_MAX_SEGMENT_CONNECTIONS: ${YTDLP_MAX_SEGMENT_CONNECTIONS:-1024}
      YTDLP_SEGMENT_SPLIT: ${YTDLP_SEGMENT_SPLIT:-256}
      YTDLP_MAX_SEGMENT_SPLIT: ${YTDLP_MAX_SEGMENT_SPLIT:-1024}
      YTDLP_SEGMENT_MIN_SPLIT_SIZE: ${YTDLP_SEGMENT_MIN_SPLIT_SIZE:-1M}
      YTDLP_SEGMENT_PIECE_LENGTH: ${YTDLP_SEGMENT_PIECE_LENGTH:-1M}
      YTDLP_SEGMENT_DISK_CACHE: ${YTDLP_SEGMENT_DISK_CACHE:-1024M}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
      rqbit:
        condition: service_started
      yt-dlp-pot-provider:
        condition: service_started
      transferd:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - downloora

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-downloora}
      DB_USERNAME: ${DB_USERNAME:-downloora}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      QUEUE_RETRY_AFTER: ${QUEUE_RETRY_AFTER:-3900}
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-downloora}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      IMPORT_S3_CONCURRENCY: ${IMPORT_S3_CONCURRENCY:-16}
      IMPORT_S3_PART_SIZE_MB: ${IMPORT_S3_PART_SIZE_MB:-32}
      TORRENTS_GLOBAL_ACTIVE_LIMIT: ${TORRENTS_GLOBAL_ACTIVE_LIMIT:-100}
      TORRENTS_PER_USER_ACTIVE_LIMIT: ${TORRENTS_PER_USER_ACTIVE_LIMIT:-50}
      TORRENTS_ENGINE: rqbit
      RQBIT_BASE_URL: http://rqbit:3030
      RQBIT_ADD_TIMEOUT: ${RQBIT_ADD_TIMEOUT:-120}
      RQBIT_KEEP_AFTER_IMPORT: ${RQBIT_KEEP_AFTER_IMPORT:-true}
      RQBIT_METADATA_TIMEOUT: ${RQBIT_METADATA_TIMEOUT:-8}
      RQBIT_METADATA_POLL_ATTEMPTS: ${RQBIT_METADATA_POLL_ATTEMPTS:-90}
      RQBIT_METADATA_POLL_INTERVAL_MS: ${RQBIT_METADATA_POLL_INTERVAL_MS:-2000}
      RQBIT_TORRENTING_PORT: ${RQBIT_TORRENTING_PORT:-6881}
      RQBIT_TORRENTING_MAX_PORT: ${RQBIT_TORRENTING_MAX_PORT:-6999}
      RQBIT_WORKER_THREADS: ${RQBIT_WORKER_THREADS:-32}
      RQBIT_MAX_BLOCKING_THREADS: ${RQBIT_MAX_BLOCKING_THREADS:-128}
      RQBIT_CONCURRENT_INIT_LIMIT: ${RQBIT_CONCURRENT_INIT_LIMIT:-64}
      RQBIT_TRACKER_REFRESH_INTERVAL: ${RQBIT_TRACKER_REFRESH_INTERVAL:-30s}
      RQBIT_PEER_CONNECT_TIMEOUT: ${RQBIT_PEER_CONNECT_TIMEOUT:-2s}
      RQBIT_PEER_READ_WRITE_TIMEOUT: ${RQBIT_PEER_READ_WRITE_TIMEOUT:-10s}
      RQBIT_DHT_QUERIES_PER_SECOND: ${RQBIT_DHT_QUERIES_PER_SECOND:-256}
      RQBIT_UPLOAD_LIMIT_BYTES: ${RQBIT_UPLOAD_LIMIT_BYTES:-4294967295}
      RQBIT_DOWNLOAD_LIMIT_BYTES: ${RQBIT_DOWNLOAD_LIMIT_BYTES:-4294967295}
      QUEUE_WORKER_PROCESSES: ${QUEUE_WORKER_PROCESSES:-10}
      YTDLP_POT_PROVIDER_URL: ${YTDLP_POT_PROVIDER_URL:-http://yt-dlp-pot-provider:4416}
      YTDLP_POT_DISABLE_INNERTUBE: ${YTDLP_POT_DISABLE_INNERTUBE:-true}
      YTDLP_YOUTUBE_PLAYER_CLIENTS: ${YTDLP_YOUTUBE_PLAYER_CLIENTS:-mweb,web_safari,android_vr}
      DOWNLOAD_TARGET_BANDWIDTH_MBPS: ${DOWNLOAD_TARGET_BANDWIDTH_MBPS:-10000}
      YTDLP_ADAPTIVE_SEGMENTS: ${YTDLP_ADAPTIVE_SEGMENTS:-true}
      YTDLP_CONCURRENT_FRAGMENTS: ${YTDLP_CONCURRENT_FRAGMENTS:-256}
      YTDLP_MAX_CONCURRENT_FRAGMENTS: ${YTDLP_MAX_CONCURRENT_FRAGMENTS:-1024}
      YTDLP_HTTP_CHUNK_SIZE: ${YTDLP_HTTP_CHUNK_SIZE:-64M}
      YTDLP_EXTERNAL_DOWNLOADER: ${YTDLP_EXTERNAL_DOWNLOADER:-aria2c}
      YTDLP_SEGMENT_CONNECTIONS: ${YTDLP_SEGMENT_CONNECTIONS:-256}
      YTDLP_MAX_SEGMENT_CONNECTIONS: ${YTDLP_MAX_SEGMENT_CONNECTIONS:-1024}
      YTDLP_SEGMENT_SPLIT: ${YTDLP_SEGMENT_SPLIT:-256}
      YTDLP_MAX_SEGMENT_SPLIT: ${YTDLP_MAX_SEGMENT_SPLIT:-1024}
      YTDLP_SEGMENT_MIN_SPLIT_SIZE: ${YTDLP_SEGMENT_MIN_SPLIT_SIZE:-1M}
      YTDLP_SEGMENT_PIECE_LENGTH: ${YTDLP_SEGMENT_PIECE_LENGTH:-1M}
      YTDLP_SEGMENT_DISK_CACHE: ${YTDLP_SEGMENT_DISK_CACHE:-1024M}
    command:
      [
        "sh",
        "-c",
        "for worker in $$(seq 1 $${QUEUE_WORKER_PROCESSES:-10}); do php artisan queue:work redis --sleep=1 --tries=3 --timeout=3600 & done; wait -n",
      ]
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      yt-dlp-pot-provider:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - downloora

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-downloora}
      DB_USERNAME: ${DB_USERNAME:-downloora}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-downloora}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    depends_on:
      app:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - downloora

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
      - "${CADDY_HTTPS_PORT:-8443}:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_started
      transferd:
        condition: service_started
    networks:
      - downloora

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-downloora}
      POSTGRES_USER: ${DB_USERNAME:-downloora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - downloora

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - downloora

  rqbit:
    image: ikatson/rqbit:latest
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      RQBIT_HTTP_API_LISTEN_ADDR: 0.0.0.0:3030
      RQBIT_TCP_LISTEN_MIN_PORT: ${RQBIT_TORRENTING_PORT:-6881}
      RQBIT_TCP_LISTEN_MAX_PORT: ${RQBIT_TORRENTING_MAX_PORT:-6999}
      RQBIT_RUNTIME_WORKER_THREADS: ${RQBIT_WORKER_THREADS:-32}
      RQBIT_RUNTIME_MAX_BLOCKING_THREADS: ${RQBIT_MAX_BLOCKING_THREADS:-128}
      RQBIT_CONCURRENT_INIT_LIMIT: ${RQBIT_CONCURRENT_INIT_LIMIT:-64}
      RQBIT_TRACKER_REFRESH_INTERVAL: ${RQBIT_TRACKER_REFRESH_INTERVAL:-30s}
      RQBIT_PEER_CONNECT_TIMEOUT: ${RQBIT_PEER_CONNECT_TIMEOUT:-2s}
      RQBIT_PEER_READ_WRITE_TIMEOUT: ${RQBIT_PEER_READ_WRITE_TIMEOUT:-10s}
      DHT_QUERIES_PER_SECOND: ${RQBIT_DHT_QUERIES_PER_SECOND:-256}
      RQBIT_RATELIMIT_DOWNLOAD: ${RQBIT_DOWNLOAD_LIMIT_BYTES:-4294967295}
      RQBIT_RATELIMIT_UPLOAD: ${RQBIT_UPLOAD_LIMIT_BYTES:-4294967295}
    ports:
      - "${RQBIT_TORRENTING_PORT:-6881}-${RQBIT_TORRENTING_MAX_PORT:-6999}:${RQBIT_TORRENTING_PORT:-6881}-${RQBIT_TORRENTING_MAX_PORT:-6999}/tcp"
      - "${RQBIT_TORRENTING_PORT:-6881}-${RQBIT_TORRENTING_MAX_PORT:-6999}:${RQBIT_TORRENTING_PORT:-6881}-${RQBIT_TORRENTING_MAX_PORT:-6999}/udp"
    volumes:
      - rqbit-config:/config
      - qbittorrent-downloads:/downloads
    command:
      [
        "server",
        "start",
        "--fastresume",
        "--persistence-location",
        "/config",
        "/downloads",
      ]
    networks:
      - downloora

  yt-dlp-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    networks:
      - downloora

  transferd:
    build:
      context: .
      dockerfile: services/transferd/Dockerfile
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      TRANSFERD_ADDR: :8080
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      LOCAL_STORAGE_ROOT: /var/www/html/storage/app/private
    depends_on:
      rustfs:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - downloora

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["/data"]
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    networks:
      - downloora

volumes:
  laravel-storage:
    external: true
    name: seedr_laravel-storage
  postgres-data:
    external: true
    name: seedr_postgres-data
  redis-data:
    external: true
    name: seedr_redis-data
  rqbit-config:
    external: true
    name: seedr_qbittorrent-config
  qbittorrent-downloads:
    external: true
    name: seedr_qbittorrent-downloads
  rustfs-data:
    external: true
    name: seedr_rustfs-data
  caddy-data:
    external: true
    name: seedr_caddy-data
  caddy-config:
    external: true
    name: seedr_caddy-config

networks:
  downloora:
    driver: bridge
