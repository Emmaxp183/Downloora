services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-seedr}
      DB_USERNAME: ${DB_USERNAME:-seedr}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-seedr}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      QBITTORRENT_BASE_URL: http://qbittorrent:8080
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
      qbittorrent:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - seedr

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-seedr}
      DB_USERNAME: ${DB_USERNAME:-seedr}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-seedr}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      QBITTORRENT_BASE_URL: http://qbittorrent:8080
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--timeout=120"]
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - laravel-storage:/var/www/html/storage
      - qbittorrent-downloads:/var/www/html/storage/app/private/qbittorrent
    networks:
      - seedr

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-seedr}
      DB_USERNAME: ${DB_USERNAME:-seedr}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      AWS_BUCKET: ${AWS_BUCKET:-seedr}
      AWS_ENDPOINT: http://rustfs:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    depends_on:
      app:
        condition: service_started
    volumes:
      - laravel-storage:/var/www/html/storage
    networks:
      - seedr

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_started
    networks:
      - seedr

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-seedr}
      POSTGRES_USER: ${DB_USERNAME:-seedr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - seedr

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - seedr

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      WEBUI_PORT: 8080
      TORRENTING_PORT: ${QBITTORRENT_TORRENTING_PORT:-6881}
    volumes:
      - qbittorrent-config:/config
      - qbittorrent-downloads:/downloads
      - ./docker/qbittorrent/qBittorrent.conf:/config/qBittorrent/qBittorrent.conf
    networks:
      - seedr

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_ADDRESS: :9000
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    command: ["/data"]
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    networks:
      - seedr

volumes:
  laravel-storage:
  postgres-data:
  redis-data:
  qbittorrent-config:
  qbittorrent-downloads:
  rustfs-data:
  caddy-data:
  caddy-config:

networks:
  seedr:
    driver: bridge
