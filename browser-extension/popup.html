<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Downloora Media Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="thumbnail-container">
          <img id="header-thumbnail" src="https://via.placeholder.com/64/111/111" alt="Thumbnail" />
        </div>
        <div class="header-content">
          <h1 id="header-title">Detected media</h1>
          <p id="header-subtitle">Ready</p>
        </div>
        <button id="settings-toggle" class="icon-button" type="button" title="Extension settings" aria-label="Extension settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6l-.09.09a2 2 0 1 1-3.82 0L10 20a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1l-.09-.09a2 2 0 1 1 0-3.82L4 10a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6l.09-.09a2 2 0 1 1 3.82 0L14 4a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.09.36.3.7.6 1l.09.09a2 2 0 1 1 0 3.82L20 14a1.7 1.7 0 0 0-.6 1Z"></path></svg>
        </button>
        <button id="close-btn" class="close-button" type="button" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </header>

      <form id="settings-panel" class="settings-panel" hidden>
        <label class="settings-label" for="downloora-url">Downloora URL</label>
        <div class="settings-row">
          <input id="downloora-url" class="settings-input" type="url" inputmode="url" autocomplete="url" />
          <button class="settings-save" type="submit">Save</button>
        </div>
        <p id="settings-status" class="settings-status" aria-live="polite"></p>
      </form>

      <div>
        <div class="section-header">
          <h2 class="section-title">CHOOSE A VERSION</h2>
          <p class="section-subtitle">Save only media you own or have rights to download.</p>
        </div>
        <section id="status" class="status">Scanning this tab...</section>
        <section id="media-list" class="media-list"></section>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
