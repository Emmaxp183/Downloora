<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seedr Media Helper</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="thumbnail-container">
          <img id="header-thumbnail" src="https://via.placeholder.com/64/111/111" alt="Thumbnail" />
        </div>
        <div class="header-content">
          <h1 id="header-title">Detected media</h1>
          <p id="header-subtitle">Ready</p>
        </div>
        <button id="close-btn" class="close-button" type="button" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </header>

      <div>
        <div class="section-header">
          <h2 class="section-title">CHOOSE A VERSION</h2>
          <p class="section-subtitle">Save only media you own or have rights to download.</p>
        </div>
        <section id="status" class="status">Scanning this tab...</section>
        <section id="media-list" class="media-list"></section>
      </div>

      <label class="setting">
        <span>Seedr dashboard URL</span>
        <input id="seedr-url" type="url" placeholder="https://localhost:8443/dashboard" />
      </label>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
